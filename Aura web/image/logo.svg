<svg width="100%" height="100%" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="round-corners">
      <!-- Un rectángulo con esquinas muy redondeadas -->
      <rect x="0" y="0" width="200" height="200" rx="50" ry="50" />
    </clipPath>
  </defs>
  <!-- Renderiza la imagen original recortando los bordes -->
  <image href="logo.png" width="200" height="200" preserveAspectRatio="xMidYMid slice" clip-path="url(#round-corners)" />
</svg>
